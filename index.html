<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiFi Off - MikroTik</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>WiFi Off</h1>
    <p class="description">Desactiva el WiFi del router MikroTik durante el tiempo indicado.</p>

    <div class="form-group">
      <label for="minutes">Tiempo en minutos:</label>
      <input
        type="number"
        id="minutes"
        min="1"
        max="1440"
        value="30"
        placeholder="Minutos"
      >
    </div>

    <button id="disableBtn" type="button">Desactivar WiFi</button>

    <div id="status" class="status hidden"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
